<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siscop 2.0 - Control de Préstamos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .nav-active { color: #2563eb; border-top: 3px solid #2563eb; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Header Principal -->
    <header class="bg-white border-b sticky top-0 z-40 px-4 py-3 flex justify-between items-center shadow-sm">
        <h1 id="page-title" class="text-xl font-black text-blue-600 tracking-tighter italic">SISCOP 2.0</h1>
        <button id="btn-logout" class="hidden text-slate-400 hover:text-red-500 transition-all">
            <i class="fas fa-power-off text-lg"></i>
        </button>
    </header>

    <!-- Contenedor de Pantallas -->
    <main id="main-content" class="p-4 max-w-md mx-auto pb-24">
        <!-- Pantalla de Carga -->
        <div id="loading" class="flex flex-col justify-center items-center h-64 space-y-4">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="text-slate-400 font-bold animate-pulse text-xs uppercase tracking-widest">Iniciando sistema...</p>
        </div>
    </main>

    <!-- Menú Inferior (Tab Bar) -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center py-2 px-2 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] hidden z-50">
        <button onclick="router('dashboard')" class="flex flex-col items-center p-2 text-slate-400 transition-all active:scale-90">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-bold mt-1">Inicio</span>
        </button>
        <button onclick="router('clientes')" class="flex flex-col items-center p-2 text-slate-400 transition-all active:scale-90">
            <i class="fas fa-users text-xl"></i>
            <span class="text-[10px] font-bold mt-1">Clientes</span>
        </button>
        <button onclick="router('prestamos')" class="flex flex-col items-center p-2 text-slate-400 transition-all active:scale-90">
            <i class="fas fa-hand-holding-dollar text-xl"></i>
            <span class="text-[10px] font-bold mt-1">Préstamos</span>
        </button>
        <button onclick="router('cobros')" class="flex flex-col items-center p-2 text-slate-400 transition-all active:scale-90">
            <i class="fas fa-calendar-check text-xl"></i>
            <span class="text-[10px] font-bold mt-1">Cobros</span>
        </button>
    </nav>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
